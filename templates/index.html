<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ChatGPT-Style Bot</title>

<style>
  /* Body & Layout */
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .chat-container {
    width: 600px;
    max-width: 90%;
    background: #1e293b;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }

  .chat-header {
    font-size: 1.6rem;
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
    text-shadow: 1px 1px 3px #000;
    animation: slideDown 0.5s ease forwards;
  }

  @keyframes slideDown {
    0% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    border-radius: 10px;
    background: #111827;
    display: flex;
    flex-direction: column;
  }

  .message {
    display: flex;
    margin: 8px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.4s forwards;
  }

  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    justify-content: flex-end;
  }

  .message.bot {
    justify-content: flex-start;
  }

  .message .bubble {
    max-width: 70%;
    padding: 12px 18px;
    border-radius: 25px;
    color: #fff;
    font-size: 0.95rem;
    line-height: 1.4;
    word-wrap: break-word;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    border-bottom-right-radius: 5px;
  }

  .message.bot .bubble {
    background: linear-gradient(135deg, #374151, #4b5563);
    border-bottom-left-radius: 5px;
  }

  .message .bubble:hover {
    transform: scale(1.05);
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    margin: 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }

  .avatar img {
    border-radius: 50%;
  }

  .avatar:hover {
    transform: scale(1.2);
  }

  .typing {
    font-style: italic;
    color: #fbbf24;
    display: flex;
    gap: 3px;
  }

  .typing span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #fbbf24;
    border-radius: 50%;
    animation: blink 1s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  .input-area {
    display: flex;
    margin-top: 10px;
    gap: 10px;
  }

  .input-area input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 25px;
    border: none;
    outline: none;
    font-size: 1rem;
    background: #111827;
    color: #fff;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
    transition: box-shadow 0.3s ease;
  }

  .input-area input:focus {
    box-shadow: 0 0 10px #3b82f6;
  }

  .input-area button {
    padding: 0 20px;
    border-radius: 25px;
    border: none;
    background: #22c55e;
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .input-area button:hover {
    transform: scale(1.1);
    background: #16a34a;
  }

  .input-area .mic {
    background: #f59e0b;
  }

  .input-area .mic:hover {
    transform: scale(1.1);
    background: #d97706;
  }

  /* Scrollbar */
  .messages::-webkit-scrollbar {
    width: 6px;
  }

  .messages::-webkit-scrollbar-thumb {
    background: #64748b;
    border-radius: 3px;
  }
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">AI ChatGPT-Style Bot 🤖</div>
  <div class="messages" id="chat"></div>
  <div class="input-area">
    <input type="text" id="textInput" placeholder="Type your message...">
    <button onclick="send()">Send</button>
    <button class="mic" onclick="startVoice()">🎤</button>
  </div>
</div>

<script>
function send() {
    let text = document.getElementById("textInput").value.trim();
    if (!text) return;

    addMessage('user', text);

    let typingId = addMessage('bot', '', true); // show typing dots

    fetch("/get?msg=" + encodeURIComponent(text))
        .then(res => res.text())
        .then(data => {
            removeMessage(typingId);
            addMessage('bot', data);
        });

    document.getElementById("textInput").value = '';
}

function addMessage(sender, text, isTyping=false) {
    const chat = document.getElementById("chat");
    const id = 'msg_' + Date.now();

    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);
    msgDiv.id = id;

    const avatarDiv = document.createElement("div");
    avatarDiv.classList.add("avatar");
    avatarDiv.innerHTML = sender === 'user' ?
      '<img src="https://i.pravatar.cc/36" />' :
      '<img src="https://i.imgur.com/7k12WkR.png" />';

    const bubbleDiv = document.createElement("div");
    bubbleDiv.classList.add("bubble");

    if(isTyping){
        bubbleDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    } else {
        bubbleDiv.innerText = text;
    }

    if (sender === 'user') {
        msgDiv.appendChild(bubbleDiv);
        msgDiv.appendChild(avatarDiv);
    } else {
        msgDiv.appendChild(avatarDiv);
        msgDiv.appendChild(bubbleDiv);
    }

    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        msgDiv.style.opacity = 1;
        msgDiv.style.transform = 'translateY(0)';
    }, 10);

    return id;
}

function removeMessage(id) {
    const msg = document.getElementById(id);
    if (msg) msg.remove();
}

function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.start();

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById("textInput").value = text;
        send();
    };
}
</script>

</body>
</html>
